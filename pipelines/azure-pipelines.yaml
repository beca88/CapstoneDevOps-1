trigger:
  branches:
    include:
      - feature/k8s-deployment

variables:
 - group: keyvault-variable-group

stages:

# =====================================
# BUILD IMAGE DIRECTLY IN ACR (NO DOCKER LOGIN REQUIRED)
# =====================================
- stage: Build
  displayName: Build container image in ACR
  jobs:
  - job: BuildImage
    displayName: ACR_Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: AzureCLI@2
      displayName: Build image using az acr build
      inputs:
        azureSubscription: azure-connection-capstone
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          echo "Building and tagging image in Azure Container Registry..."
          # Using Build.BuildId ensures a unique tag for every deployment instead of overwriting 'latest'
          az acr build \
            --registry acrcapstone1769 \
            --image healthchecks:$(Build.BuildId) \
            --image healthchecks:latest \
            .

# =====================================
# DEPLOY TO AKS + INJECT KEY VAULT SECRET
# =====================================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    displayName: AKS Deployment
    pool:
      vmImage: ubuntu-latest
    steps:

    # Create / update Kubernetes Secret from Key Vault value
    - task: Kubernetes@1
      displayName: Create Kubernetes Secret from Key Vault
      inputs:
        connectionType: Azure Resource Manager
        azureSubscription: azure-connection-capstone
        azureResourceGroup: rg-capstone-project
        kubernetesCluster: shopping-aks
        command: createSecret
        arguments: >
          generic app-secret
          --from-literal=SECRET_KEY=$(django-secret-key)
          --dry-run=client -o yaml | kubectl apply -f -

    # Ensure AKS can pull the image by creating an imagePullSecret using your new ACR connection credentials
    - task: Kubernetes@1
      displayName: Create ACR Pull Secret in AKS
      inputs:
        connectionType: Azure Resource Manager
        azureSubscription: azure-connection-capstone
        azureResourceGroup: rg-capstone-project
        kubernetesCluster: shopping-aks
        command: createSecret
        secretType: dockerRegistry
        secretName: acr-pull-secret
        dockerRegistryEndpoint: ACR-Connection # The exact name of the Service Connection you just created!

    # Apply Kubernetes manifests
    - task: Kubernetes@1
      displayName: Apply Kubernetes Deployment
      inputs:
        connectionType: Azure Resource Manager
        azureSubscription: azure-connection-capstone
        azureResourceGroup: rg-capstone-project
        kubernetesCluster: shopping-aks
        command: apply
        useConfigurationFile: true
        configuration: kubernetes/deployment.yaml