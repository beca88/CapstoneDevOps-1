# kubernetes/deployment.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthchecks-web
  labels:
    app: healthchecks
    tier: frontend
spec:
  replicas: 2  # Ensures high availability across your AKS cluster nodes
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0  # Guarantees zero-downtime upgrades
  selector:
    matchLabels:
      app: healthchecks
      tier: frontend
  template:
    metadata:
      labels:
        app: healthchecks
        tier: frontend
    spec:
      containers:
      - name: healthchecks-app
        # The pipeline replaces #{Build.BuildId}# with the live build number automatically
        image: youracrname.azurecr.io/healthchecks:#{Build.BuildId}#
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8000
          name: http
        
        # Production Environment Configurations for Django
        env:
        - name: DEBUG
          value: "False"
        - name: ALLOWED_HOSTS
          value: "*"  # In production, change this to your specific Azure Ingress domain
        - name: DB_HOST
          value: "your-postgres-server.postgres.database.azure.com" # Your Terraform-created DB
        
        # Resource allocations targeting Checkpoint 4 (Optimization)
        resources:
          limits:
            cpu: "500m"
            memory: "512Mi"
          requests:
            cpu: "250m"
            memory: "256Mi"

---
apiVersion: v1
kind: Service
metadata:
  name: healthchecks-service
spec:
  type: ClusterIP  # Keeps pods secure; route traffic to this using an Ingress controller later
  ports:
  - port: 80
    targetPort: 8000
    protocol: TCP
  selector:
    app: healthchecks
    tier: frontend