apiVersion: apps/v1
kind: Deployment
metadata:
  name: healthchecks-deployment
  labels:
    app: healthchecks
spec:
  replicas: 2
  selector:
    matchLabels:
      app: healthchecks
  template:
    metadata:
      labels:
        app: healthchecks
    spec:
      # 1. FIXED: Added the image pull secret so AKS can authenticate with your ACR
      imagePullSecrets:
        - name: acr-pull-secret

      # 2. FIXED: Isolates database migrations to a single initialization container 
      # so that replicas don't race and crash your database tables.
      initContainers:
        - name: run-migrations
          image: acrcapstone1769.azurecr.io/healthchecks:latest
          imagePullPolicy: Always
          command: ["python", "manage.py", "migrate"]
          env:
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SECRET_KEY

      containers:
        - name: healthchecks
          image: acrcapstone1769.azurecr.io/healthchecks:latest
          imagePullPolicy: Always

          # 3. CLEANED: The main container now focuses purely on serving the application
          command: ["python", "manage.py", "runserver", "0.0.0.0:8000"]

          ports:
            - containerPort: 8000

          env:
            - name: ALLOWED_HOSTS
              value: "*"

            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: app-secret
                  key: SECRET_KEY

          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "300m"
              memory: "512Mi"