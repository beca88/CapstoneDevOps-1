trigger:
  branches:
    include:
      - main
      - feature/k8s-deployment

variables:
- group: keyvault-variable-group

stages:

# ==================================
# BUILD IMAGE DIRECTLY IN ACR
# ==================================
- stage: Build
  displayName: Build container image using ACR
  jobs:
  - job: BuildImage
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: AzureCLI@2
      displayName: Build image in Azure Container Registry
      inputs:
        azureSubscription: azure-connection-capstone
        scriptType: bash
        scriptLocation: inlineScript
        inlineScript: |
          az acr build \
            --registry acrcapstone1769 \
            --image healthchecks:latest \
            .

# ======================
# DEPLOY TO AKS
# ======================
- stage: Deploy
  displayName: Deploy application to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    pool:
      vmImage: ubuntu-latest
    steps:

    # Create / Update Kubernetes Secret from Key Vault
    - task: Kubernetes@1
      displayName: Create Kubernetes Secret
      inputs:
        connectionType: Azure Resource Manager
        azureSubscription: azure-connection-capstone
        azureResourceGroup: rg-capstone-project
        kubernetesCluster: shopping-aks
        command: createSecret
        arguments: >
          generic app-secret
          --from-literal=SECRET_KEY=$(django-secret-key)
          --dry-run=client -o yaml | kubectl apply -f -

    # Apply Kubernetes Deployment
    - task: Kubernetes@1
      displayName: Deploy application to AKS
      inputs:
        connectionType: Azure Resource Manager
        azureSubscription: azure-connection-capstone
        azureResourceGroup: rg-capstone-project
        kubernetesCluster: shopping-aks
        command: apply
        useConfigurationFile: true
        configuration: kubernetes/deployment.yaml