trigger:
  branches:
    include:
      - main
      - feature/k8s-deployment

variables:
- group: keyvault-variable-group

stages:

# =====================
# BUILD & PUSH IMAGE
# =====================
- stage: Build
  displayName: Build and Push Docker Image
  jobs:
  - job: Build
    pool:
      vmImage: ubuntu-latest
    steps:
    - task: Docker@2
      displayName: Build and Push to ACR
      inputs:
        containerRegistry: 'ACR-ServiceConnection'
        repository: 'healthchecks'
        command: 'buildAndPush'
        Dockerfile: '**/Dockerfile'
        tags: |
          latest

# =====================
# DEPLOY TO AKS
# =====================
- stage: Deploy
  dependsOn: Build
  displayName: Deploy to AKS
  jobs:
  - job: Deploy
    pool:
      vmImage: ubuntu-latest
    steps:

    # Create Kubernetes Secret from Key Vault value
    - task: Kubernetes@1
      displayName: Create Kubernetes Secret
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscription: 'azure-connection-capstone'
        azureResourceGroup: 'rg-capstone-project'
        kubernetesCluster: 'shopping-aks'
        command: createSecret
        arguments: >
          generic app-secret
          --from-literal=SECRET_KEY=$(django-secret-key)
          --dry-run=client -o yaml | kubectl apply -f -

    # Deploy application
    - task: Kubernetes@1
      displayName: Deploy Application
      inputs:
        connectionType: 'Azure Resource Manager'
        azureSubscription: 'azure-connection-capstone'
        azureResourceGroup: 'rg-capstone-project'
        kubernetesCluster: 'shopping-aks'
        command: apply
        useConfigurationFile: true
        configuration: 'kubernetes/deployment.yaml'