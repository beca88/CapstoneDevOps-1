trigger:
  branches:
    include:
      - feature/k8s-deployment

variables:
- group: keyvault-variable-group

stages:

# =====================================
# BUILD IMAGE ON AGENT & PUSH TO ACR
# =====================================
- stage: Build
  displayName: Build and Push Image
  jobs:
  - job: BuildImage
    displayName: Docker Build & Push
    pool:
      vmImage: ubuntu-latest
    steps:
    
    # Builds the image on the pipeline runner and pushes it using your service connection
    - task: Docker@2
      displayName: Build and Push to ACR
      inputs:
        containerRegistry: ACR-Connection # The connection we created together!
        repository: healthchecks
        command: buildAndPush
        Dockerfile: '**/Dockerfile'
        tags: |
          $(Build.BuildId)
          latest

# =====================================
# DEPLOY TO AKS + INJECT KEY VAULT SECRET
# =====================================
- stage: Deploy
  displayName: Deploy to AKS
  dependsOn: Build
  jobs:
  - job: Deploy
    displayName: AKS Deployment
    pool:
      vmImage: ubuntu-latest
    steps:

    # Create / update Kubernetes Secret from Key Vault value
    - task: Kubernetes@1
      displayName: Create Kubernetes Secret from Key Vault
      inputs:
        connectionType: Azure Resource Manager
        azureSubscription: azure-connection-capstone
        azureResourceGroup: rg-capstone-project
        kubernetesCluster: shopping-aks
        command: createSecret
        arguments: >
          generic app-secret
          --from-literal=SECRET_KEY=$(django-secret-key)
          --dry-run=client -o yaml | kubectl apply -f -

    # Ensure AKS can pull the image by creating an imagePullSecret using your ACR connection
    - task: Kubernetes@1
      displayName: Create ACR Pull Secret in AKS
      inputs:
        connectionType: Azure Resource Manager
        azureSubscription: azure-connection-capstone
        azureResourceGroup: rg-capstone-project
        kubernetesCluster: shopping-aks
        command: createSecret
        secretType: dockerRegistry
        secretName: acr-pull-secret
        dockerRegistryEndpoint: ACR-Connection

    # Apply Kubernetes manifests
    - task: Kubernetes@1
      displayName: Apply Kubernetes Deployment
      inputs:
        connectionType: Azure Resource Manager
        azureSubscription: azure-connection-capstone
        azureResourceGroup: rg-capstone-project
        kubernetesCluster: shopping-aks
        command: apply
        useConfigurationFile: true
        configuration: kubernetes/deployment.yaml